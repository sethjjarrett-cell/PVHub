<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d0f12">
<title>PVhub &mdash; PV Design Tools</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#14171c;
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;-webkit-text-size-adjust:100%}
  #root{height:100%}
  #boot{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:15px;background:#14171c;color:#8b95a3}
  #boot .mark{display:flex;align-items:baseline;font:800 26px system-ui,sans-serif;letter-spacing:-.5px}
  #boot .mark b{color:#fff}
  #boot .mark s{text-decoration:none;color:#000;background:#f90;border-radius:6px;padding:0 7px;margin-left:3px}
  #boot .bar{width:160px;height:3px;background:#22272f;border-radius:2px;overflow:hidden}
  #boot .bar i{display:block;height:100%;width:38%;background:#e8820c;border-radius:2px;
    animation:pvslide 1.1s ease-in-out infinite}
  @keyframes pvslide{0%{transform:translateX(-110%)}100%{transform:translateX(370%)}}
  #boot p{margin:0;font:12px system-ui,sans-serif;letter-spacing:.04em}
</style>
</head>
<body>
<div id="root"></div>
<div id="boot">
  <div class="mark"><b>PV</b><s>hub</s></div>
  <div class="bar"><i></i></div>
  <p>Loading design tools&hellip;</p>
</div>

    .app * { box-sizing: border-box; }
    .app { --mono: ui-monospace, "Cascadia Code", "SF Mono", Menlo, Consolas, monospace; }
    .app ::-webkit-scrollbar { width: 10px; height: 10px; }
    .app ::-webkit-scrollbar-thumb { background: #333b46; border-radius: 6px; border: 2px solid ${T.panel}; }
    .app ::-webkit-scrollbar-track { background: transparent; }
    .sec { border-bottom: 1px solid ${T.line}; }
    .sec summary { display:flex; align-items:center; gap:10px; padding:11px 16px; cursor:pointer;
      list-style:none; user-select:none; }
    .sec summary::-webkit-details-marker { display:none; }
    .sec-code { font: 600 10px var(--mono); color:${T.accent}; letter-spacing:0.1em; min-width:26px; }
    .sec-title { font: 600 11.5px system-ui, sans-serif; color:${T.text};
      text-transform:uppercase; letter-spacing:0.09em; flex:1; }
    .sec-caret { color:${T.muted}; font-size:10px; transition: transform .15s; }
    .sec[open] .sec-caret { transform: rotate(180deg); }
    .sec-body { padding: 2px 16px 14px; display:flex; flex-wrap:wrap; gap:10px 10px; }
    .fld { display:flex; flex-direction:column; gap:4px; width:calc(50% - 5px); }
    .fld-l { font: 500 10.5px system-ui, sans-serif; color:${T.muted}; letter-spacing:0.02em; }
    .fld-box { display:flex; align-items:center; background:${T.panel2};
      border:1px solid ${T.line}; border-radius:4px; overflow:hidden; }
    .fld-box:focus-within { border-color:${T.accent}; }
    .fld-box input, .fld-box select { flex:1; min-width:0; background:transparent; border:none; outline:none;
      color:${T.text}; font: 12.5px var(--mono); padding:6px 8px; -moz-appearance:textfield; appearance:textfield; }
    .fld-box input::-webkit-outer-spin-button, .fld-box input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
    .fld-box select { appearance:none; -webkit-appearance:none; cursor:pointer; padding-right:16px; }
    .fld-box option { background:${T.panel2}; }
    .fld-u { font: 10px var(--mono); color:${T.muted}; padding:0 8px 0 2px; }
    .readout { width:100%; background:${T.panel2}; border:1px dashed ${T.line}; border-radius:4px;
      padding:7px 10px; font: 11.5px var(--mono); color:${T.text}; line-height:1.55; }
    .readout b { color:${T.accent}; font-weight:600; }
    .warns { width:100%; display:flex; flex-direction:column; gap:6px; }
    .warn { background:#2a2416; border:1px solid #4d3d18; color:${T.warn}; border-radius:4px;
      padding:6px 9px; font: 11px system-ui, sans-serif; line-height:1.45; }
    .btn { background:${T.panel2}; border:1px solid ${T.line}; color:${T.text}; border-radius:4px;
      font: 500 11.5px system-ui, sans-serif; padding:6px 12px; cursor:pointer; }
    .btn:hover { border-color:${T.accent}; }
    .btn.primary { background:${T.accent}; border-color:${T.accent}; color:#181206; font-weight:600; }
    .btn.on { background:${T.accent}; border-color:${T.accent}; color:#181206; font-weight:600; }
    .tbcell { padding: 7px 12px 8px; border-right:1px solid ${T.line}; min-width:76px; }
    .tbl { font: 600 8.5px system-ui, sans-serif; color:${T.muted}; text-transform:uppercase;
      letter-spacing:0.1em; margin-bottom:2px; white-space:nowrap; }
